<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Copy Trading Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group small {
            display: block;
            margin-top: 5px;
            color: #999;
            font-size: 0.85em;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #ff5252;
        }

        .btn-danger:disabled {
            opacity: 0.5;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .status-item {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .status-item strong {
            display: block;
            font-size: 0.9em;
            color: #666;
            margin-bottom: 8px;
        }

        .status-item span {
            display: block;
            font-size: 1.5em;
            font-weight: 700;
            color: #667eea;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
            margin-top: 10px;
        }

        .badge-active {
            background: #4ade80;
            color: #1b4d2f;
        }

        .badge-inactive {
            background: #ff6b6b;
            color: white;
        }

        .log-container {
            background: #1e1e1e;
            color: #00ff00;
            border-radius: 10px;
            padding: 20px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            line-height: 1.6;
            border: 1px solid #333;
        }

        .log-entry {
            margin-bottom: 8px;
        }

        .log-timestamp {
            color: #666;
            font-size: 0.85em;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            .status-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Polymarket Copy Trading Bot</h1>
            <p>Автоматическое копирование ставок</p>
        </div>

        <div class="alert alert-success" id="successAlert"></div>
        <div class="alert alert-error" id="errorAlert"></div>

        <div class="main-grid">
            <div class="card">
                <h2>⚙️ Настройки</h2>
                
                <div class="form-group">
                    <label for="trackedAddress">Адрес отслеживаемого аккаунта</label>
                    <input type="text" id="trackedAddress" placeholder="0x..." value="">
                    <small>Адрес кошелька трейдера</small>
                </div>

                <div class="form-group">
                    <label for="betSize">Размер ставки (USDC)</label>
                    <input type="number" id="betSize" placeholder="100" value="100" min="1" step="1">
                </div>

                <div class="form-group">
                    <label for="checkInterval">Интервал проверки (сек)</label>
                    <input type="number" id="checkInterval" placeholder="5" value="5" min="1" max="60" step="1">
                </div>

                <div class="form-group">
                    <label for="slippageTolerance">Допустимое скольжение (%)</label>
                    <input type="number" id="slippageTolerance" placeholder="2" value="2" min="0.1" max="10" step="0.1">
                </div>

                <div class="button-group">
                    <button class="btn btn-primary" id="startBtn" onclick="startBot()">Запустить</button>
                    <button class="btn btn-danger" id="stopBtn" onclick="stopBot()" disabled>Остановить</button>
                </div>
            </div>

            <div class="card">
                <h2>📈 Статус</h2>
                <div class="status-grid">
                    <div class="status-item">
                        <strong>Статус</strong>
                        <span id="botStatus">⚫ Остановлен</span>
                        <span class="status-badge badge-inactive" id="statusBadge">НЕАКТИВЕН</span>
                    </div>
                    <div class="status-item">
                        <strong>Скопировано</strong>
                        <span id="copiedBets">0</span>
                    </div>
                    <div class="status-item">
                        <strong>P&L</strong>
                        <span id="totalPnl">$0.00</span>
                    </div>
                    <div class="status-item">
                        <strong>Активность</strong>
                        <span id="lastActivity">Ожидание</span>
                    </div>
                </div>
                <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #e0e0e0;">
                    <strong>Отслеживаемый аккаунт</strong>
                    <p id="trackedAccountInfo" style="margin-top: 8px; color: #666;">Не установлен</p>
                </div>
            </div>

            <div class="card" style="grid-column: 1 / -1;">
                <h2>📝 Лог активности</h2>
                <div class="log-container" id="logContainer">
                    <div class="log-entry">
                        <span class="log-timestamp">[00:00:00]</span> Бот готов к запуску
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let botRunning = false;

        function showAlert(message, type = 'success') {
            const alert = document.getElementById(`${type}Alert`);
            alert.textContent = message;
            alert.classList.add('show');
            setTimeout(() => alert.classList.remove('show'), 5000);
        }

        function addLog(message) {
            const logContainer = document.getElementById('logContainer');
            const timestamp = new Date().toLocaleTimeString('ru-RU');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-timestamp">[${timestamp}]</span> ${message}`;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        async function startBot() {
            const trackedAddress = document.getElementById('trackedAddress').value;
            const betSize = parseFloat(document.getElementById('betSize').value);
            const checkInterval = parseInt(document.getElementById('checkInterval').value);
            const slippageTolerance = parseFloat(document.getElementById('slippageTolerance').value);

            if (!trackedAddress || !trackedAddress.startsWith('0x') || trackedAddress.length !== 42) {
                showAlert('Неверный адрес кошелька', 'error');
                return;
            }

            if (isNaN(betSize) || betSize <= 0) {
                showAlert('Размер ставки должен быть > 0', 'error');
                return;
            }

            try {
                const response = await fetch('/api/start', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        tracked_address: trackedAddress,
                        bet_size: betSize,
                        check_interval: checkInterval,
                        slippage_tolerance: slippageTolerance
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    botRunning = true;
                    document.getElementById('startBtn').disabled = true;
                    document.getElementById('stopBtn').disabled = false;
                    document.getElementById('botStatus').textContent = '🟢 Работает';
                    document.getElementById('statusBadge').className = 'status-badge badge-active';
                    document.getElementById('statusBadge').textContent = 'АКТИВЕН';
                    document.getElementById('trackedAccountInfo').textContent = trackedAddress;

                    addLog(`Бот запущен! ${trackedAddress}`);
                    showAlert('✅ Бот запущен!', 'success');
                    startPolling();
                } else {
                    showAlert(`Ошибка: ${data.error}`, 'error');
                }
            } catch (error) {
                showAlert(`Ошибка: ${error.message}`, 'error');
            }
        }

        async function stopBot() {
            try {
                await fetch('/api/stop', {method: 'POST'});
                botRunning = false;
                document.getElementById('startBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
                document.getElementById('botStatus').textContent = '⚫ Остановлен';
                document.getElementById('statusBadge').className = 'status-badge badge-inactive';
                document.getElementById('statusBadge').textContent = 'НЕАКТИВЕН';
                addLog('Бот остановлен');
                showAlert('✅ Бот остановлен', 'success');
            } catch (error) {
                showAlert(`Ошибка: ${error.message}`, 'error');
            }
        }

        async function startPolling() {
            while (botRunning) {
                try {
                    const response = await fetch('/api/status');
                    const data = await response.json();

                    if (data.running) {
                        document.getElementById('copiedBets').textContent = data.copied_bets || 0;
                        document.getElementById('totalPnl').textContent = `$${(data.total_pnl || 0).toFixed(2)}`;
                        document.getElementById('lastActivity').textContent = data.last_activity || 'Ожидание';
                    } else {
                        botRunning = false;
                        break;
                    }
                } catch (error) {
                    console.error('Error:', error);
                }

                await new Promise(resolve => setTimeout(resolve, 2000));
            }
        }

        window.addEventListener('load', () => {
            const saved = localStorage.getItem('botSettings');
            if (saved) {
                const settings = JSON.parse(saved);
                document.getElementById('trackedAddress').value = settings.trackedAddress || '';
                document.getElementById('betSize').value = settings.betSize || 100;
                document.getElementById('checkInterval').value = settings.checkInterval || 5;
                document.getElementById('slippageTolerance').value = settings.slippageTolerance || 2;
            }
        });

        ['trackedAddress', 'betSize', 'checkInterval', 'slippageTolerance'].forEach(id => {
            document.getElementById(id).addEventListener('change', () => {
                const settings = {
                    trackedAddress: document.getElementById('trackedAddress').value,
                    betSize: document.getElementById('betSize').value,
                    checkInterval: document.getElementById('checkInterval').value,
                    slippageTolerance: document.getElementById('slippageTolerance').value
                };
                localStorage.setItem('botSettings', JSON.stringify(settings));
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Copy Trading Bot</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 960px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(10px);
        }

        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 16px;
            color: #a78bfa;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Settings form */
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; margin-bottom: 4px; font-size: 0.85rem; color: #9ca3af; }
        .form-group input {
            width: 100%;
            padding: 9px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.07);
            color: #e0e0e0;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: #a78bfa; }

        /* Buttons */
        .btn-row { display: flex; gap: 12px; margin-top: 18px; }
        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-start { background: linear-gradient(90deg, #7c3aed, #4f46e5); color: #fff; }
        .btn-stop  { background: linear-gradient(90deg, #dc2626, #b91c1c); color: #fff; }

        /* Status metrics */
        .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .metric {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 14px;
            text-align: center;
        }
        .metric-label { font-size: 0.75rem; color: #9ca3af; margin-bottom: 4px; }
        .metric-value { font-size: 1.4rem; font-weight: 700; color: #e0e0e0; }
        #status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 14px;
        }
        .badge-running  { background: #065f46; color: #6ee7b7; }
        .badge-stopped  { background: #7f1d1d; color: #fca5a5; }

        /* Log */
        .log-card { grid-column: 1 / -1; }
        #log {
            height: 160px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 10px 14px;
            font-family: 'Courier New', monospace;
            font-size: 0.82rem;
            color: #a3e635;
        }
        #log p { margin-bottom: 4px; }
        #log p.error { color: #f87171; }

        @media (max-width: 640px) {
            .grid { grid-template-columns: 1fr; }
            .log-card { grid-column: 1; }
        }
    </style>
</head>
<body>
    <h1>🤖 Polymarket Copy Trading Bot</h1>

    <div class="grid">

        <!-- Settings -->
        <div class="card">
            <h2>⚙️ Settings</h2>
            <div class="form-group">
                <label for="tracked_address">Tracked Wallet Address (0x…)</label>
                <input type="text" id="tracked_address" placeholder="0x1234...abcd">
            </div>
            <div class="form-group">
                <label for="bet_size">Fixed Bet Size (USDC)</label>
                <input type="number" id="bet_size" placeholder="10" min="1" step="1">
            </div>
            <div class="form-group">
                <label for="check_interval">Check Interval (seconds)</label>
                <input type="number" id="check_interval" placeholder="60" min="10" step="1">
            </div>
            <div class="form-group">
                <label for="slippage_tolerance">Slippage Tolerance (%)</label>
                <input type="number" id="slippage_tolerance" placeholder="0.5" min="0" max="100" step="0.1">
            </div>
            <div class="btn-row">
                <button class="btn btn-start" id="btn-start" onclick="startBot()">▶ Start</button>
                <button class="btn btn-stop"  id="btn-stop"  onclick="stopBot()" disabled>■ Stop</button>
            </div>
        </div>

        <!-- Status -->
        <div class="card">
            <h2>📊 Status</h2>
            <span id="status-badge" class="badge-stopped">STOPPED</span>
            <div class="metrics">
                <div class="metric">
                    <div class="metric-label">Copied Bets</div>
                    <div class="metric-value" id="copied-bets">0</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Total P&amp;L (USDC)</div>
                    <div class="metric-value" id="total-pnl">0.00</div>
                </div>
                <div class="metric" style="grid-column:1/-1">
                    <div class="metric-label">Last Activity</div>
                    <div class="metric-value" id="last-activity" style="font-size:1rem">—</div>
                </div>
            </div>
        </div>

        <!-- Activity Log -->
        <div class="card log-card">
            <h2>📝 Activity Log</h2>
            <div id="log"></div>
        </div>

    </div>

    <script>
        const STORAGE_KEY = 'pmbot_settings';

        // --- Persist settings ---
        function saveSettings() {
            const s = {
                tracked_address:  document.getElementById('tracked_address').value,
                bet_size:         document.getElementById('bet_size').value,
                check_interval:   document.getElementById('check_interval').value,
                slippage_tolerance: document.getElementById('slippage_tolerance').value,
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
        }

        function loadSettings() {
            try {
                const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
                if (s.tracked_address)    document.getElementById('tracked_address').value    = s.tracked_address;
                if (s.bet_size)           document.getElementById('bet_size').value           = s.bet_size;
                if (s.check_interval)     document.getElementById('check_interval').value     = s.check_interval;
                if (s.slippage_tolerance) document.getElementById('slippage_tolerance').value = s.slippage_tolerance;
            } catch (e) {
                console.warn('Failed to load settings from localStorage:', e);
            }
        }

        document.querySelectorAll('input').forEach(el => el.addEventListener('input', saveSettings));

        // --- Logging ---
        function log(msg, isError = false) {
            const div = document.getElementById('log');
            const p = document.createElement('p');
            if (isError) p.classList.add('error');
            const ts = new Date().toLocaleTimeString();
            p.textContent = `[${ts}] ${msg}`;
            div.appendChild(p);
            div.scrollTop = div.scrollHeight;
        }

        // --- API calls ---
        async function startBot() {
            saveSettings();
            const payload = {
                tracked_address:    document.getElementById('tracked_address').value.trim(),
                bet_size:           parseFloat(document.getElementById('bet_size').value) || 10,
                check_interval:     parseInt(document.getElementById('check_interval').value) || 60,
                slippage_tolerance: parseFloat(document.getElementById('slippage_tolerance').value) || 0.5,
            };
            try {
                const res = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const data = await res.json();
                log(data.message, !data.success);
                if (data.success) updateButtons(true);
            } catch (e) {
                log('Failed to connect to server', true);
            }
        }

        async function stopBot() {
            try {
                const res = await fetch('/api/stop', { method: 'POST' });
                const data = await res.json();
                log(data.message, !data.success);
                if (data.success) updateButtons(false);
            } catch (e) {
                log('Failed to connect to server', true);
            }
        }

        // --- Status polling ---
        async function pollStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                const running = data.running;

                const badge = document.getElementById('status-badge');
                badge.textContent = running ? 'RUNNING' : 'STOPPED';
                badge.className = running ? 'badge-running' : 'badge-stopped';

                document.getElementById('copied-bets').textContent = data.copied_bets;
                document.getElementById('total-pnl').textContent   = parseFloat(data.total_pnl).toFixed(2);
                document.getElementById('last-activity').textContent = data.last_activity || '—';

                updateButtons(running);
            } catch (e) {
                log('Status poll failed: ' + e.message, true);
            }

        function updateButtons(running) {
            document.getElementById('btn-start').disabled = running;
            document.getElementById('btn-stop').disabled  = !running;
        }

        // --- Init ---
        loadSettings();
        pollStatus();
        setInterval(pollStatus, 5000);
    </script>
</body>
</html>
